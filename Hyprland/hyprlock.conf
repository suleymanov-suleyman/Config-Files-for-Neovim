hyprlock config location ~/.config/hypr/hyprlock.conf

# BACKGROUND
background {
    monitor =
    path = /home/suleymanov/.cache/ml4w/hyprland-dotfiles/blurred_wallpaper.png
    blur_passes = 0
}

# GENERAL
general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = false
    grace = 0
    disable_loading_bar = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    rounding = -1
    check_color = rgb(204, 136, 34)
    placeholder_text = password
    hide_input = false
    position = 0, -115
    halign = center
    valign = center
}

# DATE
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %d %B")"
  color = rgba(242, 243, 244, 0.75)
  font_size = 35
  font_family = JetBrains Mono
  position = 0, 280
  halign = center
  valign = center
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%H:%M")"
  color = rgba(242, 243, 244, 0.75)
  font_size = 130
  font_family = JetBrains Mono Extrabold
  position = 0, 180
  halign = center
  valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(/home/suleymanov/.config/hypr/scripts/suleymanov/whatsong.sh)" 
    color = rgb(255, 255, 255)
    font_size = 18
    font_family = JetBrains Mono
    position = 0, 50
    halign = center
    valign = bottom
}

# WHOAMI
label {
    monitor =
    text = cmd[update:1000] echo "$(/home/suleymanov/.config/hypr/scripts/suleymanov/whoami.sh)"
    color = rgb(255, 255, 255)
    font_size = 16
    font_family = JetBrains Mono
    position = 0, -580
    halign = center
    valign = top
}

# BATTERY
label {
    monitor =
    text = cmd[update:10000] echo "$(/home/suleymanov/.config/hypr/scripts/suleymanov/battery.sh)"
    color = rgb(255, 255, 255)
    font_size = 16
    font_family = JetBrains Mono
    position = -150, -10
    halign = right
    valign = top
}

# NETWORK
label {
    monitor =
    text = cmd[update:10000] echo "$(/home/suleymanov/.config/hypr/scripts/suleymanov/network-status.sh)"
    color = rgb(255, 255, 255)
    font_size = 16
    font_family = JetBrains Mono
    position = -20, -10
    halign = right
    valign = top
}
